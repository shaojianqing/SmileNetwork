{
    "name":"Smile Neural Network from Smith Shao",
    "networkType":"ConvNetwork",
    "trainBatchSize": 1000,
    "trainEpochCount": 200,
    "learnRateValue": 0.02,
    "inputLayer": {
        "name": "conv-1",
        "type": "convolution",
        "fieldSize": 3,
        "channelCount": 3,
        "paddingSize": 1,
        "nextName": "pool-1"
    },
    "outputLayer":{
        "name": "output",
        "type": "affine",
        "rowCount": 10,
        "columnCount" :50,
        "dimension": 10,
        "activator": "softmax",
        "prevName": "pool-2"
    },
    "hiddenLayers": [{
        "name": "pool-1",
        "type": "pool",
        "poolSize": 2,
        "poolStride":1,
        "prevName":"conv-1",
        "nextName":"conv-2"
    }, {
        "name": "conv-2",
        "type": "convolution",
        "fieldSize": 3,
        "channelCount": 3,
        "paddingSize": 1,
        "prevName":"pool-1",
        "nextName":"pool-2"
    }, {
        "name":"pool-2",
        "type": "pool",
        "poolSize": 2,
        "poolStride": 1,
        "prevName": "conv-2",
        "nextName": "output"
    }]
}